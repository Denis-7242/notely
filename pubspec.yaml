name: notely
description: A simple digital notebook app built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Hive: a fast, lightweight NoSQL database for local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Provider: simple and efficient state management
  provider: ^6.1.1
  # For generating unique IDs for each note
  uuid: ^4.3.3
  # For beautiful icons
  cupertino_icons: ^1.0.6
  # For date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Code generator for Hive type adapters
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  